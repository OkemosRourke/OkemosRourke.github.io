.tile-value{font-size:1.5rem;font-weight:bold;color:#2563eb}

</style>

const teachers={};
students.forEach(s=>{
  s.proctor.split(",").forEach(t=>{
    t=t.trim();
    if(!teachers[t]) teachers[t]={name:t,tests:new Set(),rooms:new Set(),students:[]};
    teachers[t].tests.add(s.test);
    teachers[t].rooms.add(s.testingRoom);
    teachers[t].students.push(s.name);
  });
});

const search=document.getElementById("search");
const matches=document.getElementById("matches");
const details=document.getElementById("details");

function update(){
  const q=search.value.toLowerCase().trim();
  if(!q){matches.innerHTML="";details.innerHTML="";return;}

  const sMatches=students.filter(s=>s.name.toLowerCase().includes(q));
  const tMatches=Object.values(teachers).filter(t=>t.name.toLowerCase().includes(q));
  const results=[...sMatches,...tMatches];

  matches.innerHTML="";
  details.innerHTML="";

  results.slice(0,15).forEach(item=>{
    const b=document.createElement("button");
    b.className="chip";

    if(item.students){
      b.textContent="👨‍🏫 "+item.name;
      b.onclick=()=>renderTeacher(item);
    }else{
      b.textContent=item.name;
      b.onclick=()=>renderStudent(item);
    }

    matches.appendChild(b);
  });

  if(results.length===1){
    if(results[0].students) renderTeacher(results[0]);
    else renderStudent(results[0]);
  }
}

function renderStudent(s){
  details.innerHTML=`
  <div class="details">
    <div class="tile"><div>Student</div><div class="tile-value">${s.name}</div></div>
    <div class="tile"><div>Tests</div><div class="tile-value">${s.test}</div></div>
    <div class="tile"><div>Room(s)</div><div class="tile-value">${s.testingRoom}</div></div>
    <div class="tile"><div>Proctor(s)</div><div class="tile-value">${s.proctor}</div></div>
  </div>`;
}

function renderTeacher(t){
  details.innerHTML=`
  <div class="details">
    <div class="tile"><div>Teacher</div><div class="tile-value">${t.name}</div></div>
    <div class="tile"><div>Tests</div><div class="tile-value">${[...t.tests].join(", ")}</div></div>
    <div class="tile"><div>Room(s)</div><div class="tile-value">${[...t.rooms].join(", ")}</div></div>
    <div class="tile">
      <div>Roster (${t.students.length})</div>
      <div class="roster">${t.students.sort().join("<br>")}</div>
    </div>
  </div>`;
}

search.addEventListener("input",update);
</script>
</body>
</html>
