<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Directory</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe2ea;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    .sub {
      margin: 0 0 24px;
      color: var(--muted);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 1rem;
      background: white;
    }
    input:focus, select:focus {
      outline: 2px solid var(--accent-soft);
      border-color: var(--accent);
    }
    .details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .tile {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #fff;
    }
    .tile-label {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .tile-value {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .placeholder {
      text-align: center;
      color: var(--muted);
      padding: 28px 16px;
    }
    .matches {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip {
      border: 1px solid var(--border);
      background: #f1f5f9;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .chip:hover {
      background: var(--accent-soft);
      border-color: #93c5fd;
    }
    .count {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    @media (max-width: 700px) {
      .grid, .details {
        grid-template-columns: 1fr;
      }
      .wrap {
        padding: 16px;
      }
      .tile-value {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Teacher Directory</h1>
    <p class="sub">Search or select a teacher to view room number, extension, lunch, and conference period.</p>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="search">Search</label>
          <input id="search" type="text" placeholder="Type a name, room, or extension" />
        </div>
        <div class="field">
          <label for="teacherSelect">Select teacher</label>
          <select id="teacherSelect">
            <option value="">Choose a teacher</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card" id="detailsCard">
      <div id="detailsContent" class="placeholder">Choose a teacher from the dropdown or search until one match remains.</div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;font-size:1.15rem;">Quick matches</h2>
      <div id="quickMatches" class="matches"></div>
      <div id="matchCount" class="count"></div>
    </div>
  </div>

oom": "B217", "extension": "4949", "lunch": "C", "conference": "5"}, {"name": "Reed, Dawn", "classroom": "A104", "extension": "4972", "lunch": "C", "conference": "4"}, {"name": "Richter, Laura", "classroom": "C123", "extension": "4890", "lunch": "B", "conference": "6"}, {"name": "Room A210 - Vacant", "classroom": "A210", "extension": "4963", "lunch": "", "conference": ""}, {"name": "Room B114 - Vacant", "classroom": "B114", "extension": "4996", "lunch": "", "conference": ""}, {"name": "Room C221 - Vacant", "classroom": "C221", "extension": "4885", "lunch": "", "conference": ""}, {"name": "Room D239 - Vacant", "classroom": "D239", "extension": "4773", "lunch": "", "conference": ""}, {"name": "Samluk, Melissa", "classroom": "B111", "extension": "4982", "lunch": "A", "conference": "6"}, {"name": "Sanders, Karen", "classroom": "B115", "extension": "4986", "lunch": "A", "conference": "4"}, {"name": "Saros, Jason", "classroom": "D231", "extension": "4762", "lunch": "A", "conference": "4"}, {"name": "Schoonover, Chrissy", "classroom": "D132", "extension": "4767", "lunch": "A", "conference": "6"}, {"name": "Seidl, Katie", "classroom": "A206", "extension": "4952", "lunch": "B", "conference": "6"}, {"name": "Solomon, Emily", "classroom": "B216", "extension": "4962", "lunch": "C", "conference": "6"}, {"name": "Stadt, Megan", "classroom": "LibOffice1", "extension": "4943", "lunch": "B", "conference": "N/A"}, {"name": "Stice, Mark", "classroom": "Band", "extension": "4946", "lunch": "C", "conference": "6"}, {"name": "Sundeen, Antonia", "classroom": "D232", "extension": "4763", "lunch": "A", "conference": "2"}, {"name": "Tandoc, Danielle", "classroom": "C121", "extension": "4882", "lunch": "B", "conference": "6"}, {"name": "Teacher's Lounge", "classroom": "Lounge", "extension": "4919", "lunch": "", "conference": ""}, {"name": "Turner, Molly", "classroom": "C124", "extension": "4889", "lunch": "B", "conference": "3"}, {"name": "Valla, Justin", "classroom": "Orch", "extension": "4947", "lunch": "C", "conference": "6"}, {"name": "Welch, Amanda", "classroom": "Art 3D", "extension": "4948", "lunch": "C", "conference": "1"}, {"name": "Whitman, Elijah", "classroom": "A204", "extension": "4799", "lunch": "B", "conference": "6"}, {"name": "Whitmyer, Kortney", "classroom": "A200", "extension": "4788", "lunch": "B", "conference": "2"}, {"name": "Williams, Alexandria", "classroom": "C120", "extension": "4886", "lunch": "B", "conference": "1"}, {"name": "Williams, Brian", "classroom": "C224", "extension": "4891", "lunch": "B", "conference": "3"}, {"name": "Wonch, Jeff", "classroom": "Gym/D141", "extension": "4935", "lunch": "C", "conference": "3"}, {"name": "Woodcock, Ben", "classroom": "B215", "extension": "4974", "lunch": "C", "conference": "1"}];
    const searchInput = document.getElementById('search');
    const teacherSelect = document.getElementById('teacherSelect');
    const detailsContent = document.getElementById('detailsContent');
    const quickMatches = document.getElementById('quickMatches');
    const matchCount = document.getElementById('matchCount');

    let selectedName = '';

    function normalize(value) {
      return (value || '').toString().toLowerCase();
    }

    function getFilteredTeachers() {
      const q = normalize(searchInput.value.trim());
      if (!q) return teachers;
      return teachers.filter(t =>
        [t.name, t.classroom, t.extension, t.lunch, t.conference]
          .join(' ')
          .toLowerCase()
          .includes(q)
      );
    }

    function findSelected(filtered) {
      if (selectedName) {
        return teachers.find(t => t.name === selectedName) || null;
      }
      if (filtered.length === 1) return filtered[0];
      return null;
    }

    function safe(value) {
      return value && value !== '' ? value : 'N/A';
    }

    function renderSelect(filtered) {
      const currentValue = selectedName;
      teacherSelect.innerHTML = '<option value="">Choose a teacher</option>';
      filtered.forEach(t => {
        const option = document.createElement('option');
        option.value = t.name;
        option.textContent = t.name;
        if (t.name === currentValue) option.selected = true;
        teacherSelect.appendChild(option);
      });
    }

    function renderDetails(teacher, filtered) {
      if (!teacher) {
        detailsContent.className = 'placeholder';
        detailsContent.textContent = filtered.length === 0
          ? 'No matches found. Try a different search.'
          : 'Choose a teacher from the dropdown or search until one match remains.';
        return;
      }

      detailsContent.className = 'details';
      detailsContent.innerHTML = `
        <div class="tile">
          <div class="tile-label">Teacher</div>
          <div class="tile-value">${safe(teacher.name)}</div>
        </div>
        <div class="tile">
          <div class="tile-label">Room</div>
          <div class="tile-value">${safe(teacher.classroom)}</div>
        </div>
        <div class="tile">
          <div class="tile-label">Extension</div>
          <div class="tile-value">${safe(teacher.extension)}</div>
        </div>
        <div class="tile">
          <div class="tile-label">Lunch</div>
          <div class="tile-value">${safe(teacher.lunch)}</div>
        </div>
        <div class="tile">
          <div class="tile-label">Conference</div>
          <div class="tile-value">${safe(teacher.conference)}</div>
        </div>
      `;
    }

    function renderQuickMatches(filtered) {
      quickMatches.innerHTML = '';
      filtered.slice(0, 20).forEach(t => {
        const button = document.createElement('button');
        button.className = 'chip';
        button.type = 'button';
        button.textContent = t.name;
        button.addEventListener('click', () => {
          selectedName = t.name;
          teacherSelect.value = t.name;
          update();
        });
        quickMatches.appendChild(button);
      });

      matchCount.textContent = filtered.length > 20
        ? `Showing 20 of ${filtered.length} matches. Narrow the search to see fewer results.`
        : `${filtered.length} match${filtered.length === 1 ? '' : 'es'}`;
    }

    function update() {
      const filtered = getFilteredTeachers();

      if (selectedName && !filtered.some(t => t.name === selectedName)) {
        selectedName = '';
      }

      renderSelect(filtered);
      const teacher = findSelected(filtered);
      renderDetails(teacher, filtered);
      renderQuickMatches(filtered);
    }

    searchInput.addEventListener('input', () => {
      selectedName = '';
      update();
    });

    teacherSelect.addEventListener('change', (e) => {
      selectedName = e.target.value;
      update();
    });

    update();
  </script>
